- section: 2. Canaanite Woman
  verses:
  - reference: Matthew 15:22–28 (NKJV)
    text: 22 And behold, a woman of Canaan came from that region and cried out to
      Him, saying, "Have mercy on me, O Lord, Son of David! My daughter is severely
      demon-possessed."
    highlights:
    - Son of David
  - reference: Matthew 15:22–28 (NKJV)
    text: '23 But He answered her not a word. And His disciples came and urged Him,
      saying, ''Send her away, for she cries out after us.''

      24 But He answered and said, ''I was not sent except to the lost sheep of the
      house of Israel.''

      25 Then she came and worshiped Him, saying, ''Lord, help me!'''
    highlights:
    - Lord
  - reference: Matthew 15:22–28 (NKJV)
    text: '26 But He answered and said, ''It is not good to take the children''s bread
      and throw it to the little dogs.''

      27 And she said, ''Yes, Lord, yet even the little dogs eat the crumbs which
      fall from their masters'' table.''

      28 Then Jesus answered and said to her, ''O woman, great is your faith! Let
      it be to you as you desire.'' And her daughter was healed from that very hour.'
    highlights:
    - great is your faith
    - healed from that very hour
