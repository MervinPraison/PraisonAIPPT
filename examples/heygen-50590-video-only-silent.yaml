sections:
- verses:
  - slide_type: big_number
    number: '3'
    label: Dreaming · Outcomes · Webhooks
    reference: AI agents just got a serious upgrade
    duration_sec: 4.54
    audio_start_sec: 0.0
    notes: AI agents just got a serious upgrade and it comes down to three things.
    avatar_video_path: examples/heygen-article-50590.mp4
  - slide_type: deck_exec_summary
    color_scheme: exec_grey
    text: Dreaming
    reference: First — persistent, proactive agents
    items:
    - badge: '01'
      heading: Background
      text: Work between sessions — no tab open
    - badge: '02'
      heading: Proactive
      text: Persistent agents, not reactive
    - badge: '03'
      heading: Preview
      text: Async memory curation · research preview
    duration_sec: 13.66
    audio_start_sec: 4.54
    notes: First, dreaming. Claude agents can now work in the background between sessions
      without you keeping anything open. Persistent, proactive agents, not just reactive
      ones.
    avatar_video_path: examples/heygen-article-50590.mp4
  - slide_type: deck_split_performance
    color_scheme: split_blue
    text: Outcomes
    reference: Second — define success, not every step
    header: A different way to build
    rows:
    - badge: Was
      text: Script every step in the workflow
    - badge: Now
      text: Tell the agent what to achieve · rubric grader
    duration_sec: 8.1
    audio_start_sec: 18.2
    notes: Instead of scripting every step, you tell the agent what to achieve. That's
      a fundamentally different way to build. Third, webhooks.
    avatar_video_path: examples/heygen-article-50590.mp4
  - slide_type: deck_channel_analysis
    color_scheme: channel_violet
    text: Webhooks
    reference: Third — production infrastructure
    header: Notify instantly
    rows:
    - number: 443
      label: HTTPS callbacks
      text: Agent finish or fail — your system knows
    - number: '0'
      label: No polling
      text: Real hooks · no guessing
    duration_sec: 10.68
    audio_start_sec: 26.3
    notes: When an agent finishes or fails, your system gets notified instantly. No
      polling, no guessing. Real production infrastructure.
    avatar_video_path: examples/heygen-article-50590.mp4
  - slide_type: avatar_quote
    text: How do you actually run AI agents in the real world?
    reference: All three answer the same question
    video_overlay:
      avatar:
        anchor: bottom_right
        width_ratio: 0.2
        margin_in: 0.38
        zoom_ratio: 1.3
        crop_y_ratio: 0.08
    duration_sec: 7.56
    audio_start_sec: 36.98
    notes: What makes this update interesting isn't any one feature. It's that all
      three together answer the same question.
    avatar_video_path: examples/heygen-article-50590.mp4
  - slide_type: deck_product_columns
    color_scheme: product_lavender
    text: Production foundation
    reference: Background · goals · async events
    columns:
    - number: '1'
      label: Dreaming
      text: Background processing between sessions
    - number: '2'
      label: Outcomes
      text: Goal-based evaluation
    - number: '3'
      label: Webhooks
      text: Async notifications
    duration_sec: 7.34
    audio_start_sec: 44.54
    notes: How do you actually run AI agents in the real world? Background processing,
      goal-based evaluation, async notifications.
    avatar_video_path: examples/heygen-article-50590.mp4
  - slide_type: deck_thank_you
    color_scheme: thank_you_blue
    text: THANK
