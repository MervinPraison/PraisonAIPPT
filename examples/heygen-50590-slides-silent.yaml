presentation_title: Dreaming, outcomes, and webhooks
presentation_subtitle: Claude Managed Agents update · May 2026
slide_size: widescreen
slide_style:
  background_color: '#121212'
  text_color: '#FFFFFF'
  subtitle_color: '#B8B8B8'
  title_color: '#FFFFFF'
  reference_color: '#AAAAAA'
  highlight_color: '#FFD700'
  font_name: Calibri
  layouts:
    pip:
      width_ratio: 0.14
      margin_in: 0.45
      shape: circle
      crop_y_ratio: 0.1
      zoom_ratio: 1.35
      border_color: '#FFFFFF'
      border_width_pt: 2.5
    list:
      margin_in: 0.75
sections:
- verses:
  - slide_type: big_number
    number: '3'
    label: Dreaming · Outcomes · Webhooks
    reference: AI agents just got a serious upgrade
    duration_sec: 4.0
    audio_start_sec: 0.0
    notes: AI agents just got a serious upgrade and it comes down to three things.
  - slide_type: list
    reference: 'First: Dreaming — persistent, proactive agents'
    text: 'Work in the background between sessions — no app left open

      Not just reactive: persistent, proactive agents

      Async memory curation (research preview)

      Reads memory store + up to 100 session transcripts

      Writes merged store; source read-only until you adopt output'
    duration_sec: 12.94
    audio_start_sec: 4.54
    notes: First, dreaming. Claude agents can now work in the background between sessions
      without you keeping anything open. Persistent, proactive agents, not just reactive
      ones. Second, outcomes.
  - slide_type: two_column
    reference: 'Second: Outcomes — define success, not every step'
    left: 'Old approach

      Script every step in the workflow

      Brittle when requirements change'
    right: 'Outcomes (public beta)

      Tell the agent what to achieve

      Rubric-backed iterations with an isolated grader

      satisfied · needs_revision · max_iterations'
    duration_sec: 8.1
    audio_start_sec: 18.2
    notes: Instead of scripting every step, you tell the agent what to achieve. That's
      a fundamentally different way to build. Third, webhooks.
  - slide_type: list
    reference: 'Third: Webhooks — production infrastructure'
    text: 'Signed HTTPS callbacks on port 443 (public beta)

      session.status_* · thread.* · outcome_evaluation_ended · vault.*

      Notify when agents finish or fail — instantly

      No polling · no guessing · real production hooks'
    duration_sec: 10.02
    audio_start_sec: 26.3
    notes: When an agent finishes or fails, your system gets notified instantly. No
      polling, no guessing. Real production infrastructure.
  - slide_type: avatar_quote
    text: How do you actually run AI agents in the real world?
    reference: Background processing · goal-based evaluation · async notifications
    duration_sec: 7.3
    audio_start_sec: 36.98
    notes: What makes this update interesting isn't any one feature. It's that all
      three together answer the same question.
  - slide_type: table
    header_row: true
    table_rows:
    - - Capability
      - Status
      - What it means
    - - Dreaming
      - Research preview
      - Background memory curation between sessions
    - - Outcomes
      - Public beta
      - Rubric grader · satisfied / needs_revision
    - - Webhooks
      - Public beta
      - Signed HTTPS event callbacks
    - - Multi-agent orchestration
      - Public beta
      - Coordinators delegate to specialists · shared filesystem
    reference: Code with Claude SF · 6 May 2026
    duration_sec: 7.34
    audio_start_sec: 44.54
    notes: How do you actually run AI agents in the real world? Background processing,
      goal-based evaluation, async notifications.
  - slide_type: avatar_headline
    headline: Foundation, not a demo
    subheader: Read the full article online · Managed Agents docs · Request dreaming
      access for your organisation
    duration_sec: 5.05
    audio_start_sec: 51.88
    notes: That's a foundation, not a demo. Read the full piece online.
