# Being Fruitful Through Gospel — verse-focused sermon deck (KJV / NKJV mix as supplied)
presentation_title: Being Fruitful Through Gospel
presentation_subtitle: ''
auto_upload_gdrive: true
slide_style:
  background_image: assets/background_alt.jpg
  text_color: white
  alignment: left
  reference_position: top
  font_name: Palatino

sections:
  - section: Key Scriptures
    verses:
      - reference: Romans 1:16 (NKJV)
        text: >-
          For I am not ashamed of the gospel of Christ, for it is the power of God to salvation
          for everyone who believes, for the Jew first and also for the Greek.
        highlights:
          - the power of God
          - text: salvation
            color: '#9900FF'
            bold: true
            underline: true

      - reference: Salvation - sózó
        text: |-
          To Save
          To Deliver
          To Heal
          To Preserve
          To make whole
        list_type: bullet

      - reference: Romans 7:4
        text: >-
          So, my brothers and sisters, you also died to the law through the body of Christ,
          that you might belong to another, to Him who was raised from the dead, in order that
          we might bear fruit for God.
        highlights:
          - bear fruit

      - reference: Romans 8:19
        text: >-
          For the earnest expectation of the creature waiteth for the manifestation of the sons of God.
        highlights:
          - manifestation of the sons of God

      - reference: Romans 8:32
        text: >-
          He that spared not his own Son, but delivered him up for us all, how shall he not with
          him also freely give us all things?
        highlights:
          - give us all things

  - section: How to Be Fruitful
    verses: []

  - section: '1. Focus on Jesus'
    verses:
      - reference: Romans 7:2 (NKJV)
        text: >-
          For the woman who has a husband is bound by the law to her husband as long as he lives.

      - reference: Romans 7:3 (NKJV)
        text: >-
          So then if, while her husband lives, she marries another man, she will be called an adulteress.
        highlights:
          - adulteress

      - reference: Romans 7:4 (NKJV)
        text: >-
          Therefore, my brethren, you also have become dead to the law through the body of Christ,
          that you may be married to another—to Him who was raised from the dead, that we should
          bear fruit to God.
        highlights:
          - dead to the law
          - married to another

      - reference: Romans 7:5 (NKJV)
        text: >-
          For when we were in the flesh, the sinful passions which were aroused by the law were at
          work in our members to bear fruit to death.
        highlights:
          - flesh
          - sinful passions aroused by the law
          - death

      - reference: Romans 7:6 (NKJV)
        text: >-
          But now we have been delivered from the law, having died to what we were held by, so that
          we should serve in the newness of the Spirit and not in the oldness of the letter.
        highlights:
          - delivered from the law

  - section: '2. Do Not Be Lukewarm'
    verses:
      - reference: Revelation 3:16
        text: >-
          So then because thou art lukewarm, and neither cold nor hot, I will spue thee out of my mouth.
        highlights:
          - lukewarm

      - reference: Matthew 9:16
        text: No man putteth a piece of new cloth unto an old garment.
        highlights:
          - new cloth
          - old garment

      - reference: Matthew 9:17
        text: Neither do men put new wine into old bottles.
        highlights:
          - new wine
          - old bottles

  - section: '3. Eat Solid Food'
    verses:
      - reference: Romans 8:15
        text: >-
          For ye have not received the spirit of bondage again to fear; but ye have received the
          Spirit of sonship.
        highlights:
          - sonship

      - reference: Romans 8:19
        text: >-
          For the earnest expectation of the creature waiteth for the manifestation of the sons of God.
        highlights:
          - sons of God

      - reference: Hebrews 5:13
        text: For every one that useth milk is unskilful in the word of righteousness.
        highlights:
          - milk
          - word of righteousness

      - reference: Hebrews 5:14
        text: But strong meat belongeth to them that are of full age.
        highlights:
          - strong meat
          - full age

      - reference: Galatians 4:7
        text: Wherefore thou art no more a servant, but a son.
        highlights:
          - no more a servant
          - a son

      - reference: Galatians 3:25
        text: But after that faith is come, we are no longer under a schoolmaster.
        highlights:
          - no longer under a schoolmaster

  - section: '4. It Is Free'
    verses:
      - reference: Romans 8:32
        text: >-
          He that spared not his own Son, but delivered him up for us all, how shall he not with
          him also freely give us all things?
        highlights:
          - freely

      - reference: Romans 5:17
        split_max_length: 400
        text: >-
          For if by one man's offence death reigned by one; much more they which receive abundance
          of grace and of the gift of righteousness shall reign in life by one, Jesus Christ.
        highlights:
          - gift
          - reign in life

  - section: Walking in the Flesh vs. Walking in the Spirit
    verses:
      - reference: Romans 7:5
        text: >-
          For when we were in the flesh, the sinful passions which were aroused by the law were at
          work in our members to bear fruit to death.
        highlights:
          - we were in the flesh

      - reference: Galatians 3:2–3
        split_max_length: 450
        text: >-
          This only I want to learn from you: Did you receive the Spirit by the works of the law,
          or by the hearing of faith? Are you so foolish? Having begun in the Spirit, are you now
          being made perfect by the flesh?
        highlights:
          - law
          - faith
          - begun in the Spirit
          - flesh

      - reference: Galatians 3:5–6
        split_max_length: 500
        text: >-
          Therefore He who supplies the Spirit to you and works miracles among you, does He do it
          by the works of the law, or by the hearing of faith?—just as Abraham 'believed God, and
          it was accounted to him for righteousness.'
        highlights:
          - law
          - faith
