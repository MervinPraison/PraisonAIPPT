template: sermon-dark-center
presentation_title: sermon-dark-center
presentation_subtitle: Theme gallery demo
sections:
- section: sermon-dark-center
  section_subtitle: Centred body text on sermon-dark base
  verses:
  - reference: 'template: sermon-dark-center'
    text: 'slide_size: widescreen

      alignment: center

      background_color: #1A1A2E

      background_image: assets/background_alt.jpg

      font_name: Palatino

      reference_position: bottom

      text_color: white'
    list_type: bullet
    font_size: 18
    alignment: left
- section: Colours & highlights
  verses:
  - reference: John 3:16 (NKJV)
    text: For God so loved the world that he gave his one and only Son, that whoever
      believes in him shall not perish but have eternal life.
    highlights:
    - God so loved
    - eternal life
  - reference: Romans 1:16–17 (NKJV)
    text: For I am not ashamed of the gospel of Christ, for it is the power of God
      to salvation for everyone who believes.
    highlights:
    - text: the gospel
      annotation: 1
    - text: the power
      annotation: 2
    - text: salvation
      color: '#4A86E8'
      underline: true
      annotation: 3
  - reference: Psalm 119:105 (NKJV)
    text: Your word is a lamp to my feet and a light to my path.
    highlights:
    - lamp to my feet
    - light to my path
    large_text:
      lamp to my feet: 40
- section: Alignment
  verses:
  - reference: Left aligned (default)
    text: The Lord is my shepherd; I shall not want.
    alignment: left
    font_size: 28
  - reference: Centre aligned
    text: He makes me lie down in green pastures.
    alignment: center
    font_size: 28
  - reference: Right aligned
    text: He leads me beside still waters.
    alignment: right
    font_size: 28
- section: Layout & lists
  verses:
  - reference: Matthew 12:42 (NKJV)
    leading_title: Jesus, greater than Solomon inside you
    text: The queen of the South will rise up in the judgment with this generation
      and condemn it, for she came from the ends of the earth to hear the wisdom of
      Solomon; and indeed a greater than Solomon is here.
    highlights:
    - a greater than Solomon is here
  - reference: Bullet list example
    text: 'First point from the theme

      Second point — highlight colour applies

      Third point — annotation colour on notes'
    list_type: bullet
    font_size: 26
  - reference: Numbered list example
    text: 'Faith comes by hearing

      Hearing by the word of God

      The word is near you'
    list_type: numbered
    font_size: 26
  - reference: Title-style slide
    reference_font_size: 44
    text: ''
    font_size: 28
- section: Dual passage & numbering
  verses:
  - reference: Romans 8:28 (NKJV)
    text: And we know that all things work together for good to those who love God.
    text_below_reference: To those who are called according to His purpose.
    text_below_reference_highlights:
    - called according to His purpose
    highlights:
    - all things work together for good
  - reference: Titus 2:11–13 (NKJV)
    text: '11 For the grace of God that brings salvation has appeared to all men,

      12 teaching us that, denying ungodliness and worldly lusts, we should live soberly,
      righteously, and godly in the present age,

      13 looking for the blessed hope and glorious appearing of our great God and
      Savior Jesus Christ.'
    font_size: 24
    highlights:
    - grace of God
    - blessed hope
- section: Long text split
  verses:
  - reference: Split slide demo (auto parts)
    text: This is a deliberately long passage to demonstrate automatic slide splitting
      when the text exceeds the default character limit. PraisonAI PPT splits overflow
      text across multiple slides while keeping the same reference and highlights.
      The theme colours, font, and reference position apply to every part. Add split_max_length
      on a verse to control when splitting starts. This second paragraph continues
      on the same logical slide entry until the splitter creates part two. Highlights
      still match across parts when defined on the verse object.
    split_max_length: 280
    highlights:
    - automatic slide splitting
    - split_max_length
- section: Image slides
  verses:
  - slide_type: image
    image_path: assets/showcase-diagram.png
    image_fit: contain
    reference: image_fit contain (default)
    text: Full image visible; letterboxed if needed
  - slide_type: image
    image_path: assets/showcase-diagram.png
    image_fit: cover
    reference: image_fit cover
    text: Fills the frame; may crop edges
  - slide_type: image
    image_path: assets/showcase-diagram.png
    image_fit: fill
    reference: image_fit fill
    text: Stretched to the content box
- section: Hebrew rename
  verses:
  - slide_type: hebrew_rename
    hebrew_font_size: 100
    hebrew_highlight_color: '#9900FF'
    hebrew_rows:
    - left: אַבְרָם
      right: אַבְרָהָם
      highlight_in_right: הָ
    - left: שָׂרַי
      right: שָׂרָה
      highlight_in_right: ה
    reference: God renames — new identity
    text: ''
- section: Standard layouts
  verses:
  - slide_type: title_only
    text: Title Only Slide
    reference: Optional subtitle beneath the headline
    notes: Use title_only for transition slides instead of empty verse hacks.
  - slide_type: comparison
    reference: Law vs grace (illustration)
    columns:
    - heading: Before
      text: The law condemns sin.
    - heading: After
      text: Grace brings salvation through faith.
  - slide_type: two_column
    left: Left column body text for side-by-side content.
    right: Right column body text — Two Content layout.
  - slide_type: big_number
    number: '100'
    label: Fold increase
    reference: Mark 10:30 (NKJV)
  - slide_type: quote
    text: Faith comes by hearing, and hearing by the word of God.
    reference: Romans 10:17 (NKJV)
  - slide_type: table
    table_rows:
    - - Fruit
      - Reference
    - - Love
      - Galatians 5:22
    - - Joy
      - Galatians 5:22
    - - Peace
      - Galatians 5:22
  - slide_type: picture_text
    image_path: assets/showcase-diagram.png
    image_side: left
    image_fit: contain
    text: Diagram with explanation — picture and text side by side (Text and Object
      layout).
  - reference: Speaker notes example
    text: This verse slide includes presenter notes in the PPTX.
    notes: Remind the congregation of the historical context before reading aloud.
- section: 'Multi-line

    section title'
  verses:
  - reference: Psalm 23:1 (NKJV)
    text: The Lord is my shepherd; I shall not want.
    font_size: 32
