# =============================================================================
# PraisonAI PPT — full verses template (YAML). Copy and edit; remove unused keys.
# =============================================================================

# --- Presentation (top level) -------------------------------------------------
presentation_title: Your Presentation Title Here
presentation_subtitle: Your Subtitle Here

# Optional: when true, CLI uploads PPTX to Google Drive if credentials are set.
auto_upload_gdrive: false

# Optional slide dimensions: widescreen | 16:9 | standard | 4:3 | 16:10
# Or custom: { width: 13.33, height: 7.5 }  (inches)
slide_size: widescreen

# Style theme — use a built-in template instead of repeating slide_style:
# template: sermon-dark
# See: praisonaippt --list-templates  and  docs/templates.md

# --- slide_style (optional; applies to title, section, verse, list, image slides)
# Or: slide_style: { preset: sermon-dark, overrides: { highlight_color: '#FFD700' } }
slide_style:
  # One of: background_image (path) OR background_color (hex). Image wins if both set.
  # background_image: examples/assets/background_alt.jpg
  # background_color: '#1A1A2E'

  # Colours (hex #RRGGBB or named: orange, yellow, red, green, blue, white, cyan, purple)
  # text_color: white
  # reference_color: '#CCCCCC'
  # title_color: '#FFFFFF'
  # subtitle_color: '#AAAAAA'
  # section_title_color: '#FFFFFF'
  # highlight_color: '#FFD700'
  # annotation_color: '#1E50C8'

  # reference_position: bottom  # slide foot (default); use below or top to change
  # reference_position: below   # directly under verse body
  # reference_position: top     # above verse body

  # alignment: left | center | right   # default for verse/list body
  alignment: left

  # font_name: Palatino

# --- sections ----------------------------------------------------------------
sections:
  - section: Section 1 Name
    verses:
      # --- Standard verse (reference + text) --------------------------------
      - reference: John 3:16 (NKJV)
        text: For God so loved the world that He gave His only begotten Son, that whoever believes in Him should not perish but have everlasting life.
        font_size: 32
        alignment: center
        highlights:
          - God so loved
          - everlasting life
        # large_text: { everlasting life: 40 }

      # --- Rich highlight object (optional fields: text, color, bold, italic, underline, annotation 1–9)
      - reference: Romans 1:16 (NKJV)
        text: For I am not ashamed of the gospel of Christ, for it is the power of God to salvation for everyone who believes.
        highlights:
          - text: the gospel
            annotation: 1
          - text: the power
            annotation: 2
          - text: salvation
            color: '#4A86E8'
            underline: true
            annotation: 3

      # --- Title-only slide (PowerPoint Title Only layout) -------------------
      - slide_type: title_only
        text: Your transition headline
        reference: Optional subtitle line

      # --- Title-style verse (legacy; prefer slide_type: title_only) ---------
      - reference: Your Title Here
        reference_font_size: 44
        text: ''
        font_size: 28

      # --- leading_title: top headline; reference + verse body lower on slide
      - reference: Matthew 12:42 (NKJV)
        leading_title: Jesus, Greater than Solomon inside you
        text: The queen of the South will rise up in the judgment with this generation and condemn it, for she came from the ends of the earth to hear the wisdom of Solomon; and indeed a greater than Solomon is here.
        highlights:
          - a greater than Solomon is here

      # --- Bullet / numbered list (text lines separated by \n) ---------------
      - reference: List example (bullet)
        text: |-
          First item
          Second item
          Third item
        list_type: bullet
        alignment: left
        font_size: 28

      - reference: List example (numbered)
        text: |-
          Alpha
          Beta
          Gamma
        list_type: numbered
        alignment: left
        font_size: 28

      # --- Image slide (diagram / photo) ------------------------------------
      # Paths are relative to the YAML file, cwd, or repo root (e.g. assets/...).
      # - slide_type: image
      #   image_path: assets/background_alt.jpg
      #   image_fit: contain          # contain | cover | fill (default: contain)
      #   reference: Diagram title    # optional caption line above text
      #   text: Short caption below the image

  - section: Standard layouts
    verses:
      - slide_type: comparison
        reference: Law vs grace (illustration)
        columns:
          - heading: Before
            text: The law condemns sin.
          - heading: After
            text: Grace brings salvation through faith.

      - slide_type: two_column
        left: Left column body text for side-by-side content.
        right: Right column body text — Two Content layout.

      - slide_type: big_number
        number: '100'
        label: Fold increase
        reference: Mark 10:30 (NKJV)

      - slide_type: quote
        text: Faith comes by hearing, and hearing by the word of God.
        reference: Romans 10:17 (NKJV)

      - slide_type: table
        table_rows:
          - [Fruit, Reference]
          - [Love, Galatians 5:22]
          - [Joy, Galatians 5:22]
          - [Peace, Galatians 5:22]

      - slide_type: picture_text
        image_path: assets/background_alt.jpg
        image_side: left
        image_fit: contain
        text: Diagram with explanation — picture and text side by side.

      - reference: Speaker notes example
        text: This verse slide includes presenter notes in the exported PPTX.
        notes: Remind the congregation of the historical context before reading aloud.

  # --- Avatar layouts (optional avatar_video_path + media_path) ----------------
  # All 13 types (Intro/Outro not included):
  # - slide_type: avatar_only
  # - slide_type: media_only
  #     media_path: assets/background_alt.jpg
  # - slide_type: avatar_media_1
  # - slide_type: avatar_media_2
  # - slide_type: avatar_media_3
  #     media_path: assets/background_alt.jpg
  # - slide_type: avatar_name_card
  #     headline: Your Name
  #     subheader: Your Role
  # - slide_type: avatar_headline
  # - slide_type: avatar_quote
  #     text: Example quote text.
  #     reference: Author Name
  # - slide_type: avatar_border
  # - slide_type: media_border
  # - slide_type: avatar_media_border_1
  # - slide_type: avatar_media_border_2
  # - slide_type: avatar_media_border_3

  - section: Avatar layouts
    verses:
      - slide_type: avatar_only
      - slide_type: media_only
        media_path: assets/background_alt.jpg
      - slide_type: avatar_media_1
        media_path: assets/background_alt.jpg
      - slide_type: avatar_media_2
        media_path: assets/background_alt.jpg
      - slide_type: avatar_media_3
        media_path: assets/background_alt.jpg
      - slide_type: avatar_name_card
        headline: Demo Name
        subheader: Role title
      - slide_type: avatar_headline
        headline: Headline
        subheader: Subheader
      - slide_type: avatar_quote
        text: Example quote for layout preview.
        reference: Author Name
      - slide_type: avatar_border
      - slide_type: media_border
        media_path: assets/background_alt.jpg
      - slide_type: avatar_media_border_1
        media_path: assets/background_alt.jpg
      - slide_type: avatar_media_border_2
        media_path: assets/background_alt.jpg
      - slide_type: avatar_media_border_3
        media_path: assets/background_alt.jpg

  - section: |-
      Multi-line
      Section Title
    verses:
      - reference: Psalm 23:1 (NKJV)
        text: The Lord is my shepherd; I shall not want.
