# Template gallery — one demo per built-in theme
#
# Generate all YAML + PPTX showcases (includes all 13 avatar layouts):
#   python examples/template_demos/build_demos.py
#
# Full layout reference (standard + avatar layouts):
#   praisonaippt -i examples/template.yaml -o examples/template_built.pptx
#   praisonaippt -i examples/avatar_layouts.yaml -o examples/avatar_layouts_built.pptx
#
# Each deck includes the same feature slides (highlights, annotations, alignment,
# lists, leading_title) styled with that template's settings.
#
# Built-in themes: praisonaippt --list-templates

template: sermon-dark
presentation_title: Quick template demo
presentation_subtitle: Full layout gallery in examples/template_demos/
sections:
  - section: Demo
    verses:
      - reference: John 3:16 (NKJV)
        text: For God so loved the world that he gave his one and only Son.
        highlights:
          - God so loved
          - one and only Son
