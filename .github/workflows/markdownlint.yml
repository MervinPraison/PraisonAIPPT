name: Markdown Lint

on:
  push:
    paths: 
      - '**/*.md'
  pull_request:
    paths: 
      - '**/*.md'

jobs:
  markdownlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: markdownlint-cli2
        uses: DavidAnson/markdownlint-cli2-action@v16
        with:
          globs: '**/*.md'
